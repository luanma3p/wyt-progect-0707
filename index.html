<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>伴学老师后台管理系统</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f7fa;
        z-index: 9999;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e4e7ed;
        border-top-color: #409eff;
        border-radius: 50%;
        animation: loading-rotate 0.8s linear infinite;
      }
      #app-loading .text {
        margin-top: 16px;
        color: #909399;
        font-size: 14px;
      }
      @keyframes loading-rotate {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="app-loading">
        <div class="spinner"></div>
        <div class="text">伴学老师后台管理系统加载中...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
